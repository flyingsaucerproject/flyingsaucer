<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Multi-column test</title>
    <style type="text/css">
        body {
            font-family: sans-serif;
            font-size: 12pt;
        }

        .multi {
            columns: 2 120pt;
            column-count: 2;
            column-gap: 24pt;
            column-width: 120pt;
            width: 600pt;
        }
    </style>
</head>
<body>
<div class="multi">
    <div>COL-ALPHA</div>
    <div>COL-BETA</div>
    <div>COL-GAMMA</div>
    <div>COL-DELTA</div>
    <div>COL-EPSILON</div>
    <div>COL-ZETA</div>
    <div>COL-ETA</div>
    <div>COL-THETA</div>
    <div>COL-IOTA</div>
    <div>COL-KAPPA</div>
    <div>COL-LAMBDA</div>
    <div>COL-MU</div>
</div>
</body>
</html>
